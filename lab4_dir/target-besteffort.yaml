apiVersion: v1
kind: Pod
metadata:
  name: best-effort
spec:
  priorityClassName: protected-pod
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
        - matchExpressions:
          - key: simulate
            operator: In
            values:
            - eviction
  containers:
  - name: best-effort
    image: polinux/stress
    command: ["stress"]
    args:
      - "--vm"
      - "1"
      - "--vm-bytes"
      - "350M"
      - "--vm-hang"
      - "0"
    resources: {}
